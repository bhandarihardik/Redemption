name: terraform-ci

# Day-2 Ops toil reduction (design doc section E): every PR gets an
# automatic plan + security scan posted as a comment, so a human only
# looks at infra changes that have already passed static checks. No one
# runs 'terraform apply' from a laptop in this model — see terraform-apply.yml.
on:
  pull_request:
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write # OIDC federation to AWS, no long-lived access keys in CI

env:
  TF_VERSION: "1.9.5"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive ../../..

      - name: terraform init (backend=false for format/validate stage)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/

      - name: checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: false # a failing security check BLOCKS the merge, it does not just warn

  plan:
    needs: [validate, security-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/github-actions-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/production/plan_output.txt', 'utf8').slice(-60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '#### Terraform Plan\n<details><summary>Show plan</summary>\n\n\'\'\'\n${plan}\n\'\'\'\n</details>'
            });

      - name: fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
