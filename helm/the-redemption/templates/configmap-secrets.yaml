apiVersion: v1
kind: ConfigMap
metadata:
  name: the-redemption-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "the-redemption.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  DB_HOST: {{ .Values.config.dbHost | quote }}
  DB_READ_REPLICA_HOST: {{ .Values.config.dbReadReplicaHost | quote }}
---
{{- if .Values.externalSecret.enabled }}
# ExternalSecret pulls the actual DB credentials from AWS Secrets Manager at
# sync time. The RDS instance's 'manage_master_user_password = true' setting
# means AWS itself generated and stores this — it has never existed in
# Terraform state, in this chart, or in any human's clipboard.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: the-redemption-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "the-redemption.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: the-redemption-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.externalSecret.remoteKey | quote }}
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.remoteKey | quote }}
        property: password
{{- end }}
